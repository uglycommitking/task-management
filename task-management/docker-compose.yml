services:
  postgres-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  spring-app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=postgres-db
      - DB_NAME=postgres
    depends_on:
      - postgres-db

volumes:
  pgdata: